physical_ai_server:
  ros__parameters:
    frontier_omy_f3m:
      observation_list:
        - cam_wrist
        - cam_top
        - cam_belly
        - state

      camera_topic_list:
        - cam_wrist:/camera/cam_wrist/color/image_rect_raw/compressed
        - cam_top:/camera/cam_top/color/image_rect_raw/compressed
        - cam_belly:/camera/cam_belly/color/image_rect_raw/compressed

      joint_topic_list:
        - follower_arm:/joint_states
        - leader_arm:/leader/joint_states

      command_topic_list:
        - leader_arm:/leader/joint_trajectory

      joint_list:
        - leader_arm

      rosbag_extra_topic_list:
        - /tf

      joint_order:
        follower_arm:
          - joint1
          - joint2
          - joint3
          - joint4
          - joint5
          - joint6
          # - rh_r1_joint  # 임시 제거 (현재 체크포인트 6-DoF arm 학습). 7-DoF 재학습 후 복원.
        leader_arm:
          - joint1
          - joint2
          - joint3
          - joint4
          - joint5
          - joint6
          # - rh_r1_joint  # 임시 제거 (현재 체크포인트 6-DoF arm 학습). 7-DoF 재학습 후 복원.

      urdf_path: /root/ros2_ws/src/physical_ai_tools/rosbag_recorder/config/urdf/omy_f3m.urdf
