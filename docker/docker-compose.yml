services:
  # ============================================
  # Physical AI Manager (React UI)
  # ============================================
  physical_ai_manager:
    container_name: physical_ai_manager
    image: robotis/frontier-physical-ai-manager:${VERSION:-1.0.0}-${ARCH:-arm64}
    build:
      context: ../physical_ai_manager
      dockerfile: Dockerfile
      network: host
    network_mode: host
    restart: unless-stopped
    volumes:
      - ../rosbag_recorder/config/urdf:/usr/share/nginx/html/urdf/urdf:ro
      - ../rosbag_recorder/config/ffw_description:/usr/share/nginx/html/urdf/ffw_description:ro
      - ../rosbag_recorder/config/open_manipulator_description:/usr/share/nginx/html/urdf/open_manipulator_description:ro
      - ./workspace:/data/workspace:ro

  # ============================================
  # Physical AI Server (ROS2 + Zenoh)
  # ============================================
  physical_ai_server:
    container_name: physical_ai_server
    image: robotis/frontier-physical-ai-server:${VERSION:-1.0.0}-${ARCH:-arm64}
    build:
      context: ..
      dockerfile: physical_ai_server/Dockerfile.${ARCH:-arm64}
    tty: true
    restart: always
    cap_add:
      - SYS_NICE
    ulimits:
      rtprio: 99
      rttime: -1
      memlock: 8428281856
    network_mode: host
    ipc: host
    environment:
      - DISPLAY=${DISPLAY}
      - QT_X11_NO_MITSHM=1
      - ROS_DOMAIN_ID=${ROS_DOMAIN_ID:-30}
      - RMW_IMPLEMENTATION=rmw_zenoh_cpp
      - ZENOH_ROUTER_IP=127.0.0.1
      - ZENOH_ROUTER_PORT=7447
      - ZENOH_CONFIG_OVERRIDE=transport/shared_memory/enabled=true
      # physical_ai_server.launch.py 가 이 값을 ros parameter (default_robot_type)
      # 로 변환해서 시작 시 자동 set_robot_type 호출. Web UI 가 /set_robot_type
      # 안 불러도 backend 가 즉시 사용 가능 — 새 PC 에 docker compose 옮겨도 동작.
      - DEFAULT_ROBOT_TYPE=${DEFAULT_ROBOT_TYPE:-frontier_omy_f3m}
    volumes:
      - /dev:/dev
      - /dev/shm:/dev/shm
      - ./workspace:/workspace
      - /tmp/.X11-unix:/tmp/.X11-unix:rw
      - /tmp/.docker.xauth:/tmp/.docker.xauth:rw
      - ../:/root/ros2_ws/src/physical_ai_tools/
      - ./huggingface:/root/.cache/huggingface
      - /var/run/docker.sock:/var/run/docker.sock
      - /etc/timezone:/etc/timezone:ro
      - /etc/localtime:/etc/localtime:ro
      - /var/run/robotis/agent_sockets/physical_ai_server:/var/run/agent
    privileged: true
    runtime: nvidia
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              capabilities: [gpu]

  # ============================================
  # LeRobot Server (Isolated Docker Container)
  # Communicates with physical_ai_server via Zenoh
  # ============================================
  lerobot:
    container_name: lerobot_server
    image: robotis/frontier-lerobot-zenoh:${VERSION:-1.0.0}-${ARCH:-arm64}
    build:
      context: ../third_party/lerobot
      dockerfile: Dockerfile.${ARCH:-arm64}
      args:
        GPU_ARCH: ${GPU_ARCH:-default}
    restart: unless-stopped
    cap_add:
      - SYS_NICE
    ulimits:
      rtprio: 99
      rttime: -1
      memlock: 8428281856
    network_mode: host
    ipc: host
    volumes:
      - /dev:/dev
      - /dev/shm:/dev/shm
      - ./workspace:/workspace
      - ./huggingface:/root/.cache/huggingface
      - ../third_party/zenoh_ros2_sdk:/zenoh_sdk:ro
      - ../third_party/robot_client/robot_client:/robot_client:ro
      - ../third_party/lerobot/executor.py:/app/executor.py:ro
      - ../third_party/lerobot/training.py:/app/training.py:ro
      - ../third_party/lerobot/inference.py:/app/inference.py:ro
      - /etc/timezone:/etc/timezone:ro
      - /etc/localtime:/etc/localtime:ro
    environment:
      - ROS_DOMAIN_ID=${ROS_DOMAIN_ID:-30}
      - ZENOH_ROUTER_IP=127.0.0.1
      - ZENOH_ROUTER_PORT=7447
      - ZENOH_SDK_PATH=/zenoh_sdk
      - ZENOH_CONFIG_OVERRIDE=transport/shared_memory/enabled=true
      - ZENOH_TRANSPORT_SHM_ENABLED=
      - ZENOH_SHM_ENABLED=
      - NVIDIA_VISIBLE_DEVICES=all
      - NVIDIA_DRIVER_CAPABILITIES=all
      - PYTHONUNBUFFERED=1
      - PYTHONPATH=/
      - LEROBOT_WORKSPACE=/workspace
    command: server
    depends_on:
      - physical_ai_server
    runtime: nvidia
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              capabilities: [gpu]

  # ============================================
  # GR00T N1.6 Server (Isolated Docker Container)
  # NVIDIA Isaac GR00T foundation model for robotics
  # Communicates with physical_ai_server via Zenoh
  # ============================================
  groot:
    container_name: groot_server
    image: robotis/frontier-groot-zenoh:${VERSION:-1.0.0}-${ARCH:-arm64}
    build:
      context: ../third_party/groot
      dockerfile: Dockerfile.${ARCH:-arm64}
      args:
        GPU_ARCH: ${GPU_ARCH:-default}
    restart: unless-stopped
    cap_add:
      - SYS_NICE
    ulimits:
      rtprio: 99
      rttime: -1
      memlock: 8428281856
    network_mode: host
    ipc: host
    environment:
      - ROS_DOMAIN_ID=${ROS_DOMAIN_ID:-30}
      - ZENOH_ROUTER_IP=
      - ZENOH_ROUTER_PORT=
      - ZENOH_SDK_PATH=/zenoh_sdk
      - ZENOH_CONFIG_OVERRIDE=
      - ZENOH_TRANSPORT_SHM_ENABLED=
      - ZENOH_SHM_ENABLED=
      - NVIDIA_VISIBLE_DEVICES=all
      - NVIDIA_DRIVER_CAPABILITIES=all
      - PYTHONUNBUFFERED=1
      - PYTHONPATH=/
      - GROOT_WORKSPACE=/workspace
    volumes:
      - /dev:/dev
      - /dev/shm:/dev/shm
      # - /home/hc/gr00t_ws:/gr00t_ws:ro  # 원 개발자(hc) 개인 워크스페이스 — 우리 보드엔 없음
      - /etc/timezone:/etc/timezone:ro
      - /etc/localtime:/etc/localtime:ro
      - ./huggingface:/root/.cache/huggingface
      - ../third_party/groot/workspace:/workspace
      - ../third_party/zenoh_ros2_sdk:/zenoh_sdk
      - ../third_party/robot_client/robot_client:/robot_client:ro
      - ../third_party/groot/executor.py:/app/executor.py:ro
      - ../third_party/groot/training.py:/app/training.py:ro
      - ../third_party/groot/inference.py:/app/inference.py:ro
    command: server
    depends_on:
      - physical_ai_server
    runtime: nvidia
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              capabilities: [gpu]
