# Frontier OMY F3M Robot Configuration (omy_f3m 베이스 사용자 변형)
# robot_type 식별자: frontier_omy_f3m
# - 카메라 3개: cam_wrist, cam_top, cam_belly
# - 단일 6-DoF 매니퓰레이터 + RH-P12-RN-A 그리퍼 (총 7-DoF)
# - 추론: follower_arm 관측 → GR00T → leader_arm 으로 액션 publish (JointTrajectory)
robot_name: "Frontier OMY F3M"
total_dof: 6

cameras:
  cam_wrist:
    topic: "/camera/cam_wrist/color/image_rect_raw/compressed"
    msg_type: "sensor_msgs/msg/CompressedImage"

  cam_top:
    topic: "/camera/cam_top/color/image_raw/compressed"
    msg_type: "sensor_msgs/msg/CompressedImage"

  cam_belly:
    topic: "/camera/cam_belly/color/image_raw/compressed"
    msg_type: "sensor_msgs/msg/CompressedImage"

joint_groups:
  follower_arm:
    topic: "/arm/joint_states"
    msg_type: "sensor_msgs/msg/JointState"
    role: "follower"
    joint_names:
      - omy_joint1
      - omy_joint2
      - omy_joint3
      - omy_joint4
      - omy_joint5
      - omy_joint6
      # - rh_r1_joint
    dof: 6

  leader_arm:
    topic: "/leader/joint_states"
    msg_type: "sensor_msgs/msg/JointState"
    role: "leader"
    joint_names:
      - omy_joint1
      - omy_joint2
      - omy_joint3
      - omy_joint4
      - omy_joint5
      - omy_joint6
      # - rh_r1_joint
    dof: 6

sensors: {}

rosbag_extra_topics:
  - "/tf"
