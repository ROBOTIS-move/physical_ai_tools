server {
    listen 3000;
    server_name localhost;

    root /usr/share/nginx/html;
    index index.html;

    # Gzip compression — critical for 2MB JS bundle over network
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_min_length 1024;
    gzip_comp_level 6;
    gzip_types
        text/plain
        text/css
        text/javascript
        application/javascript
        application/json
        application/wasm
        image/svg+xml;

    # WASM files — correct MIME type for WebAssembly.instantiateStreaming()
    location ~* \.wasm$ {
        types { application/wasm wasm; }
        add_header Cache-Control "public, max-age=604800";
    }

    # React SPA routing
    location / {
        try_files $uri /index.html;
    }

    # URDF static files
    location /urdf/ {
        alias /usr/share/nginx/html/urdf/;
        add_header Access-Control-Allow-Origin *;
        add_header Cache-Control "public, max-age=86400";
        types {
            application/xml urdf;
            application/octet-stream stl;
            model/stl stl;
        }
    }

    # Rosbag file serving (MCAP + MP4 videos)
    # Volume-mounted workspace served as static files via sendfile.
    # URL: /files/workspace/<bag>/<file> → /data/workspace/<bag>/<file>
    location /files/ {
        alias /data/;

        sendfile on;
        tcp_nopush on;
        tcp_nodelay on;
        aio threads;
        directio 512k;
        output_buffers 2 1m;

        add_header Accept-Ranges bytes always;
        add_header Access-Control-Allow-Origin * always;
        add_header Access-Control-Allow-Methods "GET, HEAD, OPTIONS" always;
        add_header Access-Control-Allow-Headers "Range" always;
        add_header Access-Control-Expose-Headers "Content-Length, Content-Range, Accept-Ranges" always;
        add_header Cache-Control "no-cache" always;

        if ($request_method = OPTIONS) {
            return 204;
        }

        types {
            application/octet-stream mcap;
            video/mp4 mp4;
        }
    }

    # Proxy API to Python backend (replay-data, rosbag-list, task-markers)
    location /api/ {
        proxy_pass http://127.0.0.1:8082/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_read_timeout 120s;
        proxy_connect_timeout 10s;
        proxy_send_timeout 30s;
        proxy_buffering off;
    }
}
