services:
  # ============================================
  # Physical AI Manager (React UI)
  # ============================================
  physical_ai_manager:
    container_name: physical_ai_manager
    image: robotis/physical-ai-manager:latest
    build:
      context: ../physical_ai_manager
      dockerfile: Dockerfile
    network_mode: host
    restart: unless-stopped

  # ============================================
  # Physical AI Server (ROS2 + Zenoh)
  # ============================================
  physical_ai_server:
    container_name: physical_ai_server
    image: robotis/physical-ai-server:${ARCH:-amd64}
    build:
      # Build context is project root for COPY to work
      context: ..
      # Use ARCH env var to select Dockerfile (default: amd64)
      # For Jetson: ARCH=arm64 docker compose up --build
      dockerfile: physical_ai_server/Dockerfile.${ARCH:-amd64}
    tty: true
    restart: always
    cap_add:
      - SYS_NICE
    ulimits:
      rtprio: 99
      rttime: -1
      memlock: 8428281856
    network_mode: host
    # Shared Memory support for Zenoh communication with lerobot
    ipc: host
    environment:
      - DISPLAY=${DISPLAY}
      - QT_X11_NO_MITSHM=1
      # ROS2 RMW configuration - use Zenoh instead of DDS
      - RMW_IMPLEMENTATION=rmw_zenoh_cpp
      # Zenoh configuration
      - ZENOH_ROUTER_IP=127.0.0.1
      - ZENOH_ROUTER_PORT=7447
    volumes:
      - /dev:/dev
      - ./workspace:/workspace
      - /tmp/.X11-unix:/tmp/.X11-unix:rw
      - /tmp/.docker.xauth:/tmp/.docker.xauth:rw
      - ../:/root/ros2_ws/src/physical_ai_tools/
      - ./huggingface:/root/.cache/huggingface
      # Docker socket for cross-container exec (v2.1 -> v3.0 conversion)
      - /var/run/docker.sock:/var/run/docker.sock
      # Shared Memory
      - /dev/shm:/dev/shm
      - /etc/timezone:/etc/timezone:ro
      - /etc/localtime:/etc/localtime:ro
    privileged: true
    # Zenoh router is managed externally, just keep container running
    command: bash
    runtime: nvidia
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              capabilities: [gpu]

  # ============================================
  # LeRobot Server (Isolated Docker Container)
  # Communicates with physical_ai_server via Zenoh
  # ============================================
  lerobot:
    container_name: lerobot_server
    image: robotis/lerobot-zenoh:${ARCH:-amd64}
    build:
      # Build context is third_party/lerobot/ (new structure)
      context: ../third_party/lerobot
      # Use ARCH env var to select Dockerfile (default: amd64)
      # For Jetson: ARCH=arm64 docker compose up --build
      dockerfile: Dockerfile.${ARCH:-amd64}
      args:
        GPU_ARCH: ${GPU_ARCH:-default}

    # Network: host mode for Zenoh communication
    network_mode: host

    # Shared Memory support for high-performance Zenoh transport
    ipc: host

    # GPU support for training and inference
    runtime: nvidia
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              capabilities: [gpu]

    # Volume mappings
    volumes:
      # Shared Memory device
      - /dev/shm:/dev/shm

      # Shared workspace with physical_ai_server (datasets, models, outputs)
      - ./workspace:/workspace

      # HuggingFace cache (shared with physical_ai_server)
      - ./huggingface:/root/.cache/huggingface

      # Zenoh SDK (shared across all opensource integrations)
      - ../third_party/zenoh_ros2_sdk:/zenoh_sdk:ro

      # LeRobot executor.py (for development - mount latest code)
      - ../third_party/lerobot/executor.py:/app/executor.py:ro

      # Timezone
      - /etc/timezone:/etc/timezone:ro
      - /etc/localtime:/etc/localtime:ro

    # Environment variables
    environment:
      # ROS Domain ID - MUST match physical_ai_server
      - ROS_DOMAIN_ID=${ROS_DOMAIN_ID:-0}

      # Zenoh configuration - peer-to-peer mode (no router needed)
      - ZENOH_ROUTER_IP=127.0.0.1
      - ZENOH_ROUTER_PORT=7447
      - ZENOH_SHM_ENABLED=true
      - ZENOH_SDK_PATH=/zenoh_sdk
      # Override to enable peer-to-peer scouting (connects to rmw_zenoh router via default endpoint)
      - ZENOH_CONFIG_OVERRIDE=mode="peer";scouting/multicast/enabled=true;scouting/gossip/enabled=true

      # GPU
      - NVIDIA_VISIBLE_DEVICES=all
      - NVIDIA_DRIVER_CAPABILITIES=all

      # Python
      - PYTHONUNBUFFERED=1

      # Workspace path
      - LEROBOT_WORKSPACE=/workspace

    # Auto restart
    restart: unless-stopped

    # Default command: start Zenoh server
    command: server

    # Dependencies
    depends_on:
      - physical_ai_server

  # ============================================
  # GR00T N1.6 Server (Isolated Docker Container)
  # NVIDIA Isaac GR00T foundation model for robotics
  # Communicates with physical_ai_server via Zenoh
  # ============================================
  groot:
    container_name: groot_server
    image: robotis/groot-zenoh:${ARCH:-amd64}
    build:
      # Build context is third_party/groot/ (GR00T integration)
      context: ../third_party/groot
      # Use ARCH env var to select Dockerfile (default: amd64)
      # For Jetson: ARCH=arm64 docker compose up --build
      dockerfile: Dockerfile.${ARCH:-amd64}
      args:
        GPU_ARCH: ${GPU_ARCH:-default}

    # Network: host mode for Zenoh communication
    network_mode: host

    # Shared Memory support for high-performance Zenoh transport
    ipc: host

    # GPU support for training and inference
    runtime: nvidia
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              capabilities: [gpu]

    # Volume mappings
    volumes:
      # Shared Memory device
      - /dev/shm:/dev/shm

      # GR00T workspace (datasets, checkpoints, outputs)
      # Maps: host third_party/groot/workspace <-> container /workspace
      - ../third_party/groot/workspace:/workspace

      # HuggingFace cache (shared with physical_ai_server and lerobot)
      - ./huggingface:/root/.cache/huggingface

      # Zenoh SDK (shared across all opensource integrations)
      - ../third_party/zenoh_ros2_sdk:/zenoh_sdk:ro

      # GR00T model checkpoints (host gr00t_ws → container /gr00t_ws)
      - /home/hc/gr00t_ws:/gr00t_ws:ro

      # GR00T executor.py (for development - mount latest code)
      - ../third_party/groot/executor.py:/app/executor.py:ro

      # Timezone
      - /etc/timezone:/etc/timezone:ro
      - /etc/localtime:/etc/localtime:ro

    # Environment variables
    environment:
      # ROS Domain ID - MUST match physical_ai_server
      - ROS_DOMAIN_ID=${ROS_DOMAIN_ID:-0}

      # Zenoh configuration - peer-to-peer mode (no router needed)
      - ZENOH_ROUTER_IP=127.0.0.1
      - ZENOH_ROUTER_PORT=7447
      - ZENOH_SHM_ENABLED=true
      - ZENOH_SDK_PATH=/zenoh_sdk
      # Override to enable peer-to-peer scouting (connects to rmw_zenoh router via default endpoint)
      - ZENOH_CONFIG_OVERRIDE=mode="peer";scouting/multicast/enabled=true;scouting/gossip/enabled=true

      # GPU
      - NVIDIA_VISIBLE_DEVICES=all
      - NVIDIA_DRIVER_CAPABILITIES=all

      # Python
      - PYTHONUNBUFFERED=1

      # Workspace path
      - GROOT_WORKSPACE=/workspace

    # Auto restart
    restart: unless-stopped

    # Default command: start Zenoh server
    command: server

    # Dependencies
    depends_on:
      - physical_ai_server
