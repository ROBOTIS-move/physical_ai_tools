services:
  physical_ai_manager:
    container_name: physical_ai_manager
    image: robotis/physical-ai-manager:latest
    build:
      context: ../physical_ai_manager
      dockerfile: Dockerfile
    network_mode: host
    restart: unless-stopped
  physical_ai_server:
    container_name: physical_ai_server
    image: robotis/physical-ai-server:latest
    build:
      context: ..
      dockerfile: physical_ai_server/Dockerfile.arm64
    tty: true
    restart: always
    cap_add:
      - SYS_NICE
    ulimits:
      rtprio: 99
      rttime: -1
      memlock: 8428281856
    network_mode: host
    environment:
      - DISPLAY=${DISPLAY}
      - QT_X11_NO_MITSHM=1
    volumes:
      - /dev:/dev
      - ./workspace:/workspace
      - /tmp/.X11-unix:/tmp/.X11-unix:rw
      - /tmp/.docker.xauth:/tmp/.docker.xauth:rw
      - ../:/root/ros2_ws/src/physical_ai_tools/
      - ./huggingface:/root/.cache/huggingface
      - /etc/timezone:/etc/timezone:ro
      - /etc/localtime:/etc/localtime:ro
      - /var/run/robotis/agent_sockets/physical_ai_server:/var/run/agent
      - ./s6-agent:/etc/s6-overlay/s6-rc.d/s6-agent
      - ./s6-services/physical_ai_server:/etc/s6-overlay/s6-rc.d/physical_ai_server
      - ./s6-services/physical_ai_server-log:/etc/s6-overlay/s6-rc.d/physical_ai_server-log
      - ./s6-services/physical_ai_server-log-prepare:/etc/s6-overlay/s6-rc.d/physical_ai_server-log-prepare
    privileged: true
    runtime: nvidia
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              capabilities: [gpu]
